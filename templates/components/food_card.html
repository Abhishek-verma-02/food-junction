<div class="col-lg-4 col-md-6 mb-4">

    <div class="card shadow-sm h-100 food-card">

        <img src="{{ url_for('static', filename='images/' + food.image) }}"
             class="card-img-top">

        <div class="card-body">

            <h5>{{ food.name }}</h5>

            <p class="text-muted">
                {{ food.description }}
            </p>

            <div class="d-flex justify-content-between align-items-center">

                <span class="text-warning">
                    ⭐ {{ food.rating }}
                </span>

                <h5 class="text-danger">
                    ₹{{ food.price }}
                </h5>

            </div>

            <a href="{{ url_for('food.food_details', food_id=food._id) }}"
               class="btn btn-warning w-100 mt-3">
                View Details
            </a>

        </div>

    </div>

</div>
