{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<div class="row">

<div class="col-md-6">

<img src="{{ url_for('static', filename='images/' + food.image) }}"
     class="img-fluid rounded shadow">

</div>

<div class="col-md-6">

<h2>{{ food.name }}</h2>

<p class="text-muted">

{{ food.description }}

</p>

<h4 class="text-danger">

₹{{ food.price }}

</h4>

<p>

⭐ {{ food.rating }}

</p>

<p>

Category :
<strong>{{ food.category }}</strong>

</p>

<a href="{{ url_for('cart.add_cart', food_id=food._id) }}"
   class="btn btn-warning">
    🛒 Add to Cart
</a>

<button class="btn btn-outline-danger">

❤ Wishlist

</button>

</div>

</div>

</div>

{% endblock %}
