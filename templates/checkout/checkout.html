{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2>Checkout</h2>

<hr>

<form method="POST">

<div class="mb-3">
<label>Phone Number</label>

<input
type="text"
name="phone"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Delivery Address</label>

<textarea
name="address"
class="form-control"
required></textarea>

</div>

<div class="mb-3">

<label>Payment Method</label>

<select
name="payment"
class="form-control">

<option value="COD">

Cash On Delivery

</option>

<option value="Razorpay">

Razorpay

</option>

</select>

</div>

<h4>

Grand Total : ₹{{ total }}

</h4>

<button
class="btn btn-success">

Place Order

</button>

</form>

</div>

{% endblock %}
